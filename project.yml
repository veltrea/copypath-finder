name: CopyPath
options:
  bundleIdPrefix: com.copypath
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true

settings:
  base:
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual
    DEVELOPMENT_TEAM: ""
    SWIFT_VERSION: "5.0"
    ENABLE_HARDENED_RUNTIME: YES
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  CopyPath:
    type: application
    platform: macOS
    sources:
      - path: CopyPath
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.copypath.app
        INFOPLIST_FILE: CopyPath/Info.plist
        CODE_SIGN_ENTITLEMENTS: CopyPath/CopyPath.entitlements
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        ENABLE_APP_SANDBOX: NO
        GENERATE_INFOPLIST_FILE: NO
